<!DOCTYPE html>
<html>
<body>
    <h1>観測レポート生成</h1>
    <form method="POST">
        <select name="row_index">
            {% for index, row in df.iterrows() %}
                <option value="{{ index }}">
                    {{ row['日付'] }} - {{ row['観測員ID'] }} ({{ row['（BBQ場 ） 時間帯  '] }})
                </option>
            {% endfor %}
        </select>
        <button type="submit">この行のPDFを作成</button>
    </form>
</body>
</html>
