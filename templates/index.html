<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>水辺リスク観測レポート生成</title>
</head>
<body>
    <h1>水辺リスク観測レポート生成</h1>

    {% if error %}
        <p style="color: red;">{{ error }}</p>
    {% endif %}

    <h2>1. CSVをアップロード</h2>
    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="file" accept=".csv">
        <button type="submit">アップロード</button>
    </form>

    <h2>2. 行を選んでPDFを作成</h2>
    {% if options %}
        <form method="POST">
            <select name="row_index">
                {% for option in options %}
                    <option value="{{ option.index }}">{{ option.label }}</option>
                {% endfor %}
            </select>
            <button type="submit">この行のPDFを作成</button>
        </form>
    {% else %}
        <p>CSVがアップロードされていません。まずは上のフォームからアップロードしてください。</p>
    {% endif %}
</body>
</html>
